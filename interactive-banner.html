<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMCO — Scroll Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:auto;-webkit-overflow-scrolling:touch;}
body{
  background:#000;
  overflow-x:hidden;
  font-family:'DM Sans',sans-serif;
}

.video-scroll-container{
  position:relative;
  height:600vh;
}

.video-sticky{
  position:sticky;
  top:0;
  width:100%;
  height:100vh;
  overflow:hidden;
}

.video-sticky video{
  position:absolute;
  top:50%;left:50%;
  min-width:100%;min-height:100%;
  width:auto;height:auto;
  transform:translate(-50%,-50%);
  object-fit:cover;
  display:none;
}

.video-sticky canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  will-change:contents;
}

/* ═══════════════════════════════
   LOADING BAR (first visit only)
═══════════════════════════════ */
.frame-loader{
  position:fixed;inset:0;
  z-index:100;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  transition:opacity .5s ease;
}
.frame-loader.hidden{opacity:0;pointer-events:none;}
.frame-loader.done{display:none;}
.frame-loader-bar{
  width:220px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;
}
.frame-loader-fill{
  height:100%;width:0%;background:#FFD100;border-radius:2px;transition:width .08s linear;
}
.frame-loader-text{
  font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.06em;
}

.scroll-progress{
  position:fixed;top:0;left:0;height:2px;
  background:#FFD100;z-index:999;width:0%;
  pointer-events:none;
}

/* ═══════════════════════════════
   TITLE OVERLAYS
═══════════════════════════════ */
.title-overlay{
  position:absolute;
  left:0;top:0;bottom:0;
  z-index:10;
  display:flex;
  align-items:center;
  pointer-events:none;
  opacity:0;
  padding-left:clamp(40px,8vw,120px);
  will-change:opacity,transform;
}

.title-text{
  font-family:'Outfit',sans-serif;
  font-weight:900;
  font-size:clamp(36px,5vw,68px);
  line-height:1.15;
  letter-spacing:-1.5px;
  text-align:left;
  max-width:700px;
  text-shadow:0 2px 24px rgba(0,0,0,.85), 0 0 80px rgba(0,0,0,.5);
}

.title-text .word{
  display:inline-block;
  opacity:0;
  color:#FFD100;
  text-shadow:0 2px 24px rgba(0,0,0,.85), 0 0 80px rgba(0,0,0,.5);
  will-change:opacity,transform,color;
}

.title-text .word-space{
  display:inline-block;
  width:.35em;
}

/* Dark gradient scrim behind titles for contrast */
.title-overlay::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:60%;
  background:linear-gradient(90deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.3) 60%, transparent 100%);
  pointer-events:none;
  z-index:-1;
}


/* ═══════════════════════════════
   FINAL SECTION — Hero + Search
═══════════════════════════════ */
.final-hero{
  position:absolute;
  inset:0;
  z-index:12;
  display:flex;
  justify-content:space-between;
  gap:clamp(30px,4vw,60px);
  padding:0 clamp(40px,8vw,120px);
  opacity:0;
  pointer-events:none;
  will-change:opacity;
  transform:translate3d(0,0,0);
}
.final-hero.active{
  opacity:1;
  pointer-events:all;
}

.final-hero::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,
    rgba(0,0,0,.75) 0%,
    rgba(0,0,0,.5) 50%,
    rgba(0,0,0,.65) 100%
  );
  z-index:-1;
}

.final-left{
  flex:1;
  max-width:560px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
}

.final-title{
  font-family:'Outfit',sans-serif;
  font-weight:900;
  font-size:clamp(32px,4.5vw,56px);
  line-height:1.25;
  letter-spacing:-1.5px;
  color:#fff;
  margin-bottom:40px;
}

.final-title .highlight{
  display:inline-block;
  background:#FFD100;
  color:#1A2F4A;
  padding:2px 14px;
  border-radius:5px;
  font-style:italic;
}

.browse-cta{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 32px;
  background:#FFD100;
  color:#1A2F4A;
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:16px;
  letter-spacing:.02em;
  border-radius:10px;
  text-decoration:none;
  transition:background .2s, transform .15s;
}
.browse-cta:hover{
  background:#E6C200;
  transform:translateY(-2px);
}

/* ── AI Search Box ── */
.ai-search-box{
  position:absolute;
  right:clamp(40px,8vw,120px);
  width:100%;
  max-width:547px;
}


.ai-search-inner{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:60px;
  padding:6px 6px 6px 20px;
  box-shadow:0 8px 40px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.1);
  transition:box-shadow .3s;
}
.ai-search-inner:focus-within{
  box-shadow:0 8px 40px rgba(0,0,0,.4), 0 0 0 2px #FFD100;
}

.ai-search-icon{
  width:20px;height:20px;flex-shrink:0;margin-right:12px;
}

.ai-search-input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  color:#1A2F4A;
  padding:12px 0;
  min-width:0;
}
.ai-search-input::placeholder{
  color:#9BA8B5;
}

.ai-search-btn{
  width:44px;height:44px;
  border-radius:50%;
  background:#FFD100;
  border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .2s, transform .15s;
}
.ai-search-btn:hover{
  background:#E6C200;
  transform:scale(1.05);
}
.ai-search-btn svg{
  width:24px;height:24px;
}

.ai-search-hint{
  position:absolute;
  left:20px;
  bottom:-28px;
  display:flex;
  align-items:center;
  gap:6px;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  color:rgba(255,255,255,.45);
  letter-spacing:.03em;
  white-space:nowrap;
}



/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media(max-width:1024px){
  .final-hero{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 6vw;padding-bottom:60px;}
  .final-left{max-width:100%;align-items:center;}
  .ai-search-box{position:relative;top:auto!important;right:auto;max-width:547px;margin-top:30px;}
}
@media(max-width:768px){
  .title-overlay{padding-left:6vw;}
  .title-text{font-size:clamp(28px,8vw,48px);letter-spacing:-0.5px;max-width:90vw;}
  .final-title{font-size:clamp(28px,7vw,42px);}
  .ai-search-input{font-size:14px;}
}
@media(max-width:480px){
  .title-text{font-size:clamp(24px,7vw,36px);}
  .final-title{font-size:clamp(24px,7vw,34px);}
}
</style>
</head>
<body>

<!-- Loading bar (shown on first visit while extracting, hidden on cached revisit) -->
<div class="frame-loader" id="frameLoader">
  <div class="frame-loader-bar"><div class="frame-loader-fill" id="loaderFill"></div></div>
  <div class="frame-loader-text" id="loaderText">Loading...</div>
</div>

<div class="scroll-progress" id="scrollProgress"></div>

<div class="video-scroll-container" id="videoScrollContainer">
  <div class="video-sticky">

    <video id="scrollVideo" muted playsinline preload="auto">
      <source src="famco-marketplace3.1-compressed.mp4" type="video/mp4">

    <canvas id="frameCanvas"></canvas>

    <!-- DEBUG: scroll progress indicator -->
    <div id="scrollDebug" style="position:fixed;top:16px;right:16px;z-index:9999;background:rgba(0,0,0,.8);color:#FFD100;font-family:'Outfit',monospace;font-size:18px;font-weight:700;padding:10px 16px;border-radius:8px;border:1px solid #FFD100;box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none;letter-spacing:.05em;">

    </div>

    <!-- FINAL HERO -->
    <div class="final-hero" id="finalHero">
        <div class="final-left">
          <h1 class="final-title">
            <span style="white-space:nowrap">The GCC's Most Trusted</span> <span class="highlight">FAMCO Approved</span> Marketplace
          </h1>
          <a href="listing.html" class="browse-cta">Browse Equipment <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
        </div>

        <!-- AI Search Box -->
        <div class="ai-search-box">
          <div class="ai-search-inner">
            <svg class="ai-search-icon" viewBox="0 0 24 24" fill="none" stroke="#9BA8B5" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" class="ai-search-input" placeholder="Search trucks, equipment, brands...">
            <button class="ai-search-btn" aria-label="Search">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2z" fill="#1A2F4A"/><path d="M18 14l.75 2.25L21 17l-2.25.75L18 20l-.75-2.25L15 17l2.25-.75L18 14z" fill="#1A2F4A"/><path d="M5 16l.5 1.5L7 18l-1.5.5L5 20l-.5-1.5L3 18l1.5-.5L5 16z" fill="#1A2F4A"/></svg>
            </button>
          </div>
          <div class="ai-search-hint">
            <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M8 1l.72 4.56L13.28 6.28 8.72 7.28 8 12 7.28 7.28 2.72 6.28 7.28 5.56 8 1z" fill="#FFD100"/></svg>
            AI-powered search across 500+ listings
          </div>
        </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════
   SPLIT TITLES INTO WORDS
═══════════════════════════════ */
(function(){
  document.querySelectorAll('.title-text').forEach(function(el){
    var nodes = Array.prototype.slice.call(el.childNodes);
    var items = [];
    nodes.forEach(function(node){
      if(node.nodeName === 'BR'){
        items.push({type:'br'});
      } else {
        node.textContent.split(/(\s+)/).forEach(function(w){
          if(!w) return;
          if(/^\s+$/.test(w)) items.push({type:'space'});
          else items.push({type:'word', text:w});
        });
      }
    });
    el.innerHTML = '';
    items.forEach(function(item){
      if(item.type === 'br'){
        el.appendChild(document.createElement('br'));
      } else if(item.type === 'space'){
        var sp = document.createElement('span');
        sp.className = 'word word-space';
        el.appendChild(sp);
      } else {
        var span = document.createElement('span');
        span.className = 'word';
        span.textContent = item.text;
        el.appendChild(span);
      }
    });
  });
})();


/* ═══════════════════════════════
   IndexedDB FRAME CACHE + SCROLL
═══════════════════════════════ */
(function(){
  var video     = document.getElementById('scrollVideo');
  var canvas    = document.getElementById('frameCanvas');
  var ctx       = canvas.getContext('2d');
  var container = document.getElementById('videoScrollContainer');
  var bar       = document.getElementById('scrollProgress');
  var finalHero = document.getElementById('finalHero');
  var loader    = document.getElementById('frameLoader');
  var loaderFill= document.getElementById('loaderFill');
  var loaderText= document.getElementById('loaderText');

  /* ── Align search box top with CTA top ── */
  var searchBox = document.querySelector('.ai-search-box');
  var ctaBtn    = document.querySelector('.browse-cta');
  function alignSearchBox(){
    if(!searchBox || !ctaBtn || !finalHero) return;
    var ctaRect  = ctaBtn.getBoundingClientRect();
    var heroRect = finalHero.getBoundingClientRect();
    searchBox.style.top = (ctaRect.top - heroRect.top) + 'px';
  }
  alignSearchBox();
  window.addEventListener('resize', alignSearchBox);

  if(!video || !container || !canvas) return;

  var frames       = [];   // ImageBitmap array
  var totalFrames  = 0;
  var FPS          = 24;   // 24fps — good balance of smoothness vs cache size
  var useDuration  = 0;
  var currentFrame = -1;
  var canvasW = 0, canvasH = 0;

  var DB_NAME    = 'famco-frames';
  var DB_VERSION = 1;
  var STORE_NAME = 'frames';
  var CACHE_KEY  = 'famco-marketplace3.1-v4'; // change if video changes

  /* ═══════════════════════════════
     IndexedDB helpers
  ═══════════════════════════════ */
  function openDB(){
    return new Promise(function(resolve, reject){
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e){
        var db = e.target.result;
        if(!db.objectStoreNames.contains(STORE_NAME)){
          db.createObjectStore(STORE_NAME);
        }
      };
      req.onsuccess = function(e){ resolve(e.target.result); };
      req.onerror   = function(){ reject(req.error); };
    });
  }

  function dbGet(db, key){
    return new Promise(function(resolve, reject){
      var tx = db.transaction(STORE_NAME, 'readonly');
      var req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = function(){ resolve(req.result || null); };
      req.onerror   = function(){ reject(req.error); };
    });
  }

  function dbPut(db, key, value){
    return new Promise(function(resolve, reject){
      var tx = db.transaction(STORE_NAME, 'readwrite');
      var req = tx.objectStore(STORE_NAME).put(value, key);
      req.onsuccess = function(){ resolve(); };
      req.onerror   = function(){ reject(req.error); };
    });
  }

  /* ═══════════════════════════════
     Load cached frames from IDB
     Returns array of Blob or null
  ═══════════════════════════════ */
  function loadFromCache(db){
    return dbGet(db, CACHE_KEY).then(function(data){
      if(!data || !data.blobs || !data.w || !data.h) return null;
      canvasW = data.w;
      canvasH = data.h;
      totalFrames = data.blobs.length;
      useDuration = data.useDuration || 0;
      // Convert blobs → ImageBitmap
      var promises = data.blobs.map(function(blob){
        return createImageBitmap(blob);
      });
      return Promise.all(promises);
    });
  }

  /* ═══════════════════════════════
     Extract frames from video + save to IDB
  ═══════════════════════════════ */
  function extractAndCache(db){
    return new Promise(function(resolve){
      var duration = video.duration;
      useDuration = Math.max(0, duration - 1.5);
      totalFrames = Math.ceil(useDuration * FPS);
      if(totalFrames < 1){ resolve([]); return; }

      var vw = video.videoWidth;
      var vh = video.videoHeight;
      var scale = Math.min(1, 960 / Math.max(vw, vh)); // 960px cap for smaller cache
      canvasW = Math.round(vw * scale);
      canvasH = Math.round(vh * scale);

      var tempCanvas = document.createElement('canvas');
      tempCanvas.width  = canvasW;
      tempCanvas.height = canvasH;
      var tempCtx = tempCanvas.getContext('2d');

      var bitmaps = [];
      var blobs   = [];
      var idx = 0;

      function grabNext(){
        if(idx >= totalFrames){
          // Save to IDB in background
          dbPut(db, CACHE_KEY, {
            blobs: blobs,
            w: canvasW,
            h: canvasH,
            useDuration: useDuration,
            ts: Date.now()
          }).catch(function(){});
          resolve(bitmaps);
          return;
        }
        video.currentTime = (idx / totalFrames) * useDuration;
      }

      video.onseeked = function(){
        tempCtx.drawImage(video, 0, 0, canvasW, canvasH);

        // Create bitmap for immediate use
        createImageBitmap(tempCanvas).then(function(bmp){
          bitmaps[idx] = bmp;

          // Create blob for cache (WebP if supported, else PNG)
          tempCanvas.toBlob(function(blob){
            blobs[idx] = blob;
            idx++;
            var pct = Math.round((idx / totalFrames) * 100);
            if(loaderFill) loaderFill.style.width = pct + '%';
            if(loaderText) loaderText.textContent = 'Caching frames... ' + pct + '%';
            grabNext();
          }, 'image/webp', 0.75);
        });
      };

      grabNext();
    });
  }

  /* ═══════════════════════════════
     APPLE-STYLE SMOOTH SCROLL ENGINE
     - Lerp-smoothed progress (no snap)
     - Sub-frame canvas blending
     - Cubic bezier easing on all values
  ═══════════════════════════════ */

  var smoothProgress = 0;  // lerped scroll position
  var LERP = 0.08;         // smoothing factor (lower = silkier, 0.06–0.10 sweet spot)

  /* Easing helpers */
  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
  function easeInOutCubic(t){ return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  function easeOutQuart(t){ return 1 - Math.pow(1 - t, 4); }

  /* ── Draw frame with sub-frame blending ── */
  function drawFrameSmooth(exactIndex){
    var maxIdx = frames.length - 1;
    if(maxIdx < 0) return;
    exactIndex = Math.max(0, Math.min(maxIdx, exactIndex));

    var lo = Math.floor(exactIndex);
    var hi = Math.min(lo + 1, maxIdx);
    var blend = exactIndex - lo;

    // Skip if same integer frame and low blend
    if(lo === currentFrame && blend < 0.01) return;
    currentFrame = lo;

    var cw = canvas.width, ch = canvas.height;

    if(!frames[lo]) return;

    // If blend is negligible or same frame, draw single
    if(blend < 0.02 || lo === hi || !frames[hi]){
      ctx.globalAlpha = 1;
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(frames[lo], 0, 0, cw, ch);
    } else {
      // Sub-frame blend: draw base frame, overlay next with blend alpha
      ctx.globalAlpha = 1;
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(frames[lo], 0, 0, cw, ch);
      ctx.globalAlpha = blend;
      ctx.drawImage(frames[hi], 0, 0, cw, ch);
      ctx.globalAlpha = 1;
    }
  }

  /* ── Title data ── */
  var titleEls = document.querySelectorAll('.title-overlay');
  var titleData = [];
  titleEls.forEach(function(el){
    titleData.push({
      el: el,
      words: el.querySelectorAll('.word:not(.word-space)'),
      inAt: parseFloat(el.dataset.in),
      outAt: parseFloat(el.dataset.out),
      _lastLocal: -999
    });
  });

  /* ── Update titles — word by word with smooth easing ── */
  function updateTitles(progress){
    titleData.forEach(function(td){
      var local = (progress - td.inAt) / (td.outAt - td.inAt);

      // Skip DOM updates if value barely changed
      if(Math.abs(local - td._lastLocal) < 0.001) return;
      td._lastLocal = local;

      if(local < -0.01 || local > 1.01){
        td.el.style.opacity = '0';
        return;
      }

      td.el.style.opacity = '1';
      var count = td.words.length;

      /* Phase 1: 0–10% — quick fade in yellow */
      if(local <= 0.10){
        var p = local / 0.10;
        var e = easeOutCubic(p);
        td.words.forEach(function(w){
          w.style.opacity = String(e);
          w.style.color = '#FFD100';
          w.style.transform = 'translate3d(0,' + (10 * (1 - e)) + 'px,0)';
        });
      }
      /* Phase 2: 10–20% — yellow → white */
      else if(local <= 0.20){
        var p = (local - 0.10) / 0.10;
        var e = easeInOutCubic(p);
        var g = Math.round(209 + 46 * e);
        var b = Math.round(255 * e);
        td.words.forEach(function(w){
          w.style.opacity = '1';
          w.style.color = 'rgb(255,' + g + ',' + b + ')';
          w.style.transform = 'translate3d(0,0,0)';
        });
      }
      /* Phase 3: 20–80% — hold white (full readable window) */
      else if(local <= 0.80){
        td.words.forEach(function(w){
          w.style.opacity = '1';
          w.style.color = '#fff';
          w.style.transform = 'translate3d(0,0,0)';
        });
      }
      /* Phase 4: 80–100% — fade out upward */
      else {
        var p = (local - 0.80) / 0.20;
        var e = easeOutQuart(p);
        td.el.style.opacity = String(1 - e);
        td.words.forEach(function(w){
          w.style.color = '#fff';
          w.style.transform = 'translate3d(0,' + (-14 * e) + 'px,0)';
        });
      }
    });
  }

  /* ── Final hero with smooth fade ── */
  var smoothHeroOpacity = 0;

  function updateFinalHero(progress){
    var targetOpacity = 0;
    if(progress >= 0.47){
      var fadeIn = Math.min(1, (progress - 0.47) / 0.05);
      targetOpacity = easeOutCubic(fadeIn);
    }

    // Lerp the hero opacity for silk-smooth transition
    smoothHeroOpacity += (targetOpacity - smoothHeroOpacity) * 0.12;
    if(Math.abs(smoothHeroOpacity - targetOpacity) < 0.005) smoothHeroOpacity = targetOpacity;

    finalHero.style.opacity = String(smoothHeroOpacity);

    if(smoothHeroOpacity > 0.5){
      if(!finalHero.classList.contains('active')) finalHero.classList.add('active');
    } else {
      finalHero.classList.remove('active');
    }
  }

  /* ── Main scroll loop — Apple-style lerp ── */
  function loop(){
    var rect     = container.getBoundingClientRect();
    var total    = container.offsetHeight - window.innerHeight;
    var scrolled = -rect.top;
    var rawProgress = Math.max(0, Math.min(1, scrolled / total));

    // Lerp: smooth the scroll position (this is the key to Apple feel)
    smoothProgress += (rawProgress - smoothProgress) * LERP;

    // Snap to target when very close (prevents infinite micro-drift)
    if(Math.abs(smoothProgress - rawProgress) < 0.0001) smoothProgress = rawProgress;

    // Map video: full duration into 0–30% of smooth scroll
    var videoProgress = Math.min(smoothProgress / 0.50, 1.0);
    var exactFrame = videoProgress * (totalFrames - 1);
    drawFrameSmooth(exactFrame);

    updateTitles(smoothProgress);
    updateFinalHero(smoothProgress);

    // Debug timestamp
    var debugEl = document.getElementById('scrollDebugValue');
    if(debugEl) debugEl.textContent = smoothProgress.toFixed(3);

    // Progress bar (uses raw scroll, not smoothed)
    var pageTotal  = document.documentElement.scrollHeight - window.innerHeight;
    var pageScroll = window.scrollY || window.pageYOffset;
    bar.style.width = (pageTotal > 0 ? (pageScroll / pageTotal) * 100 : 0) + '%';

    requestAnimationFrame(loop);
  }

  /* ── Hide loader + start ── */
  function hideLoaderAndStart(){
    canvas.width  = canvasW;
    canvas.height = canvasH;
    canvas.style.width  = '100%';
    canvas.style.height = '100%';
    drawFrameSmooth(0);

    if(loader){
      loader.classList.add('hidden');
      setTimeout(function(){ loader.classList.add('done'); }, 500);
    }

    loop();
  }

  /* ═══════════════════════════════
     INIT — try cache first, fallback to extract
  ═══════════════════════════════ */
  video.addEventListener('loadedmetadata', function(){
    openDB().then(function(db){
      // Try loading from IndexedDB cache
      return loadFromCache(db).then(function(cached){
        if(cached && cached.length > 0){
          // Cache hit — instant start, no loader visible
          if(loaderText) loaderText.textContent = '';
          frames = cached;
          hideLoaderAndStart();
        } else {
          // Cache miss — extract frames, show progress
          if(loaderText) loaderText.textContent = 'Preparing first visit...';
          return extractAndCache(db).then(function(bitmaps){
            frames = bitmaps;
            hideLoaderAndStart();
          });
        }
      });
    }).catch(function(){
      // IndexedDB not available — extract without caching
      if(loaderText) loaderText.textContent = 'Loading...';

      var duration = video.duration;
      useDuration = Math.max(0, duration - 1.5);
      totalFrames = Math.ceil(useDuration * FPS);
      var vw = video.videoWidth, vh = video.videoHeight;
      var scale = Math.min(1, 960 / Math.max(vw, vh));
      canvasW = Math.round(vw * scale);
      canvasH = Math.round(vh * scale);

      var tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvasW; tempCanvas.height = canvasH;
      var tempCtx = tempCanvas.getContext('2d');
      var idx = 0;

      function grab(){
        if(idx >= totalFrames){ hideLoaderAndStart(); return; }
        video.currentTime = (idx / totalFrames) * useDuration;
      }
      video.onseeked = function(){
        tempCtx.drawImage(video, 0, 0, canvasW, canvasH);
        createImageBitmap(tempCanvas).then(function(bmp){
          frames[idx] = bmp;
          idx++;
          if(loaderFill) loaderFill.style.width = Math.round((idx/totalFrames)*100) + '%';
          grab();
        });
      };
      grab();
    });
  });

  video.load();
})();
</script>
